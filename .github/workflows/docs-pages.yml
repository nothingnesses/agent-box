name: Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/docs-pages.yml']
  pull_request:
    paths: ['docs/**', '.github/workflows/docs-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache mdBook tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-mdbook-tools-2026-03-01
          restore-keys: |
            ${{ runner.os }}-mdbook-tools-

      - name: Install mdBook + mdbook-excalidraw
        run: |
          cargo install mdbook mdbook-excalidraw --locked

      - name: Build mdBook
        run: mdbook build docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
